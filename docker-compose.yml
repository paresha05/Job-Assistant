version: '3.8'

services:
  job-hunt-assistant:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: job-hunt-assistant
    ports:
      - "8501:8501"
    environment:
      - USAJOBS_API_KEY=${USAJOBS_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    env_file:
      - .env
    volumes:
      # Persist application data
      - ./data:/app/data
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - job-hunt-network

  # Optional: Add a reverse proxy for production
  nginx:
    image: nginx:alpine
    container_name: job-hunt-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro  # For SSL certificates
    depends_on:
      - job-hunt-assistant
    restart: unless-stopped
    networks:
      - job-hunt-network
    profiles:
      - production  # Only start with --profile production

networks:
  job-hunt-network:
    driver: bridge

volumes:
  app_data:
    driver: local
